<!DOCTYPE html>
<html>
<head>
<title>Emotion Selection</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>👨‍⚕️ Dr. CareSam</header>

<div class="container">

<div class="bot">
Hello, I'm CareSam. How are you feeling today?
</div>

<div class="emotions">

<div onclick="selectEmotion('Angry')" class="emotion">😡<br>Angry</div>
<div onclick="selectEmotion('Anxious')" class="emotion">😰<br>Anxious</div>
<div onclick="selectEmotion('Sad')" class="emotion">😢<br>Sad</div>
<div onclick="selectEmotion('Happy')" class="emotion">😊<br>Happy</div>
<div onclick="selectEmotion('Tired')" class="emotion">😴<br>Tired</div>
<div onclick="selectEmotion('Excited')" class="emotion">🤩<br>Excited</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
